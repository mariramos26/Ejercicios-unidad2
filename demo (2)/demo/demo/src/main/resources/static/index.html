<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Docentes</title>
<link rel="stylesheet" href="estilo.css">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="contenedor">

  <h2><i class="fas fa-chalkboard-teacher"></i> Registro de Docentes</h2>
  <div id="mensaje" style="display:none; padding:10px; border-radius:6px; margin-bottom:10px; font-weight:500;"></div>

  <select id="tipoDoc">
    <option>C.C</option>
    <option>C.E</option>
    <option>TI</option>
    <option>NIUP</option>
  </select>

  <input type="text" id="nombre" placeholder="Nombre">
  <input type="text" id="apellido" placeholder="Apellido">
  <input type="date" id="fecha">

  <select id="nivel">
    <option>Pregrado</option>
    <option>Maestría</option>
    <option>Doctorado</option>
  </select>

  <select id="area">
    <option>Matemáticas</option>
    <option>Ciencias</option>
    <option>Sistemas</option>
  </select>

  <button id="btnAgregar" onclick="agregarDocente()">Agregar</button>
  <input type="search" id="buscar" placeholder="Buscar por Nombre" oninput="mostrarDocentes()">
  <button onclick="mostrarDocentes()">Ver Docentes</button>

  <div id="contenedorLista">
    <h3>Lista de Docentes</h3>
    <table id="tablaDocentes">
      <thead>
        <tr>
          <th>Tipo Doc</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Fecha</th>
          <th>Nivel</th>
          <th>Área</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
